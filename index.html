<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <header>
        <!-- Navbar Start -->
        <nav class="Navbar-container">
            <a href="#Home" class="Navbar-Logo">Team</a>
            <ul>
                <li>
                    <a href="#Home">Home</a>
                </li>
                <li>
                    <a href="#About">About</a>
                </li>
                <li>
                    <a href="#Contact">Contact</a>
                </li>
            </ul>
        </nav>
        <!-- Navbar End -->
    </header>
    <main>
        <!-- Home Start -->
        <section id="Home" class="Hero">
            <div class="Home-Wrapper">
                <figure>
                    <img src="image/background3.jpg" style="width: 300px; height: 300px; border-radius: 200px;"/>
                </figure>
                <div class="Hero-Container">
                    <h1>Hello, This is Team</h1>
                    <p>member of this team are</p>
                </div>
            </div>
        </section>
        <!-- Home End -->

        <!-- About Start -->
        <Section id="About" class="About">
            <div class="About-Wrapper">
                <h2>About Us</h2>
                <div class="About-Container">
                    <h3>Background</h2>
                    <p>text</p>
                </div>
                <figure>
                    <img src="image/background2.jpg" style="width: 200px; height: 200px; border-radius: 50px;">
                </figure>
            </div>
        </Section>
        <!-- About End -->

        <!-- Contact Start -->
        <Section id="Contact" class="Contact">
            <div class="Contact-Wrapper">
                <h2>Contact Us</h2>
                <div class="Contact-Container">
                    <form id="form" class="cp-form" action="#" method="post">
                        <div class="Input1">
                            <label for="Name">Your Name</label>
                            <input type="text" id="Name" name="Name" placeholder="Enter Your Name" required>
                        </div>
                        <div class="Input2">
                            <label for="Email">Your Email</label>
                            <input type="text" id="Email" name="Email" placeholder="Enter Your Email" required>
                        </div>
                        <div class="Input3">
                            <label for="Message">Your Message</label>
                            <textarea id="message" name="message" placeholder="Enter Your Message" rows="5" required></textarea>
                        </div>
                        <div class="cp-btn">
                            <button type="submit" aria-label="send message">Send Message</button>
                        </div>
                    </form>
                </div>
            </div>
        </Section>
        <!-- Contact End -->
    </main>
    <footer>
        <!-- Footer Start -->
        <div class="Footer-Wrapper">
            <h2>Team</h2>
            <div class="Pages">
                <h2>Pages</h2>
                <ul>
                    <li>
                        <a href="#Home">Home</a>
                    </li>
                    <li>
                        <a href="#About">About</a>
                    </li>
                    <li>
                        <a href="#Contact">Contact</a>
                    </li>
                </ul>
            </div>
            <div class="Info">
                <h2>Contact</h2>
                <ul>
                    <li>
                        <a>Linkedin</a>
                    </li>
                    <li>
                        <a>Instagram</a>
                    </li>
                </ul>
            </div>
        </div>
        <!-- Footer End -->
    </footer>
</body>
</html>
